{% extends "base.html" %}
{% block title %}Create Poll – PulseVote{% endblock %}

{% block extra_styles %}
<style>
  .page-header {
    margin-bottom: 2rem;
  }
  .page-header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 1.8rem;
    font-weight: 800;
    letter-spacing: -0.5px;
    margin-bottom: 0.3rem;
  }
  .page-header p { color: var(--muted); font-size: 0.85rem; }

  .form-group { margin-bottom: 1.5rem; }

  .options-list { display: flex; flex-direction: column; gap: 0.6rem; }

  .option-row {
    display: flex;
    gap: 0.5rem;
    align-items: center;
  }
  .option-row input { flex: 1; }

  .remove-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    width: 36px;
    height: 36px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .remove-btn:hover {
    border-color: var(--accent2);
    color: var(--accent2);
    background: rgba(255,58,124,0.08);
  }

  .add-option-btn {
    background: transparent;
    border: 1px dashed var(--border);
    color: var(--muted);
    width: 100%;
    padding: 0.65rem;
    border-radius: var(--radius);
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 0.82rem;
    transition: all 0.2s;
    margin-top: 0.4rem;
  }
  .add-option-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(124,58,255,0.06);
  }

  .form-actions {
    display: flex;
    gap: 0.75rem;
    justify-content: flex-end;
    margin-top: 2rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
  }

  .option-num {
    font-size: 0.7rem;
    color: var(--muted);
    width: 20px;
    text-align: right;
    flex-shrink: 0;
  }
</style>
{% endblock %}

{% block content %}
<div class="page-header animate">
  <h1>✦ New Poll</h1>
  <p>Add your question and at least 2 options to get started.</p>
</div>

<div class="card animate animate-delay-1">
  <form method="POST" action="/create">
    <div class="form-group">
      <label for="question">Poll Question</label>
      <input type="text" id="question" name="question" placeholder="e.g. What's your favourite programming language?" required maxlength="300"/>
    </div>

    <div class="form-group">
      <label>Answer Options <span style="color: var(--accent3); font-size:0.68rem;">(min. 2)</span></label>
      <div class="options-list" id="options-list">
        <div class="option-row">
          <span class="option-num">1.</span>
          <input type="text" name="options" placeholder="Option 1" required maxlength="200"/>
        </div>
        <div class="option-row">
          <span class="option-num">2.</span>
          <input type="text" name="options" placeholder="Option 2" required maxlength="200"/>
        </div>
      </div>
      <button type="button" class="add-option-btn" onclick="addOption()">+ Add another option</button>
    </div>

    <div class="form-actions">
      <a href="/" class="btn btn-ghost">Cancel</a>
      <button type="submit" class="btn btn-primary">Launch Poll →</button>
    </div>
  </form>
</div>

<script>
  let count = 2;
  function addOption() {
    if (count >= 8) return;
    count++;
    const list = document.getElementById('options-list');
    const row = document.createElement('div');
    row.className = 'option-row';
    row.innerHTML = `
      <span class="option-num">${count}.</span>
      <input type="text" name="options" placeholder="Option ${count}" maxlength="200"/>
      <button type="button" class="remove-btn" onclick="removeOption(this)">×</button>
    `;
    list.appendChild(row);
    row.querySelector('input').focus();
  }
  function removeOption(btn) {
    btn.closest('.option-row').remove();
    // renumber
    document.querySelectorAll('#options-list .option-num').forEach((el, i) => {
      el.textContent = (i + 1) + '.';
    });
    count--;
  }
</script>
{% endblock %}
